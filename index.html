<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Baligha Journey — Interactive Lesson</title>
<meta name="description" content="An interactive Shia lesson for young girls about becoming a baligha — full stories, questions, a game, and a pledge." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Amiri:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF2E1;
    --bg-deep: #F6E9CE;
    --surface: #FFFDF8;
    --surface-tint: #FDF6E8;
    --ink: #3A2B57;
    --ink-soft: #6B5D82;
    --purple: #6B3FA0;
    --purple-deep: #4A2A73;
    --gold: #C99A3E;
    --gold-deep: #A87B24;
    --gold-pale: #F3E3B8;
    --rose: #D07C97;
    --rose-deep: #B15C79;
    --sage: #5F9679;
    --sage-deep: #3E7A5C;
    --teal: #2F7A6B;
    --sky: #7C8FC7;
    --night: #241B38;
    --night-deep: #150C24;
    --line: #ECDDBB;
    --line-soft: #EFE2C6;
    --shadow: 0 12px 32px rgba(90, 60, 20, 0.12);
    --radius: 22px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    scroll-behavior: smooth;
  }

  body{
    min-height:100vh;
    background-image:
      radial-gradient(circle at 6% 8%, rgba(201,154,62,0.10), transparent 40%),
      radial-gradient(circle at 96% 14%, rgba(107,63,160,0.08), transparent 38%),
      radial-gradient(circle at 92% 92%, rgba(95,150,121,0.08), transparent 40%);
  }

  h1, h2, h3, .display{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.15;
    margin: 0;
    color: var(--purple);
  }

  p{ margin:0; }

  button{ font-family: inherit; cursor:pointer; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible{
    outline: 3px solid var(--sky);
    outline-offset: 2px;
  }

  img{ max-width:100%; display:block; }

  /* ---------- decorative motifs ---------- */

  .motif{ position:absolute; opacity:0.55; pointer-events:none; color: var(--gold); }
  .motif.moon{ width:34px; height:34px; }
  .motif.star{ width:14px; height:14px; }

  .ornament-row{
    display:flex; align-items:center; gap:10px;
    color: var(--gold-deep); opacity:0.75; margin-bottom:10px;
  }
  .ornament-row .line{ flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ornament-row svg{ width:16px; height:16px; flex:none; }

  /* ---------- layout shell ---------- */

  #app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .topbar{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    padding: 12px 20px;
    background: rgba(251,242,225,0.90);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .topbar.hidden{ display:none; }

  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 1.05rem;
    color: var(--purple-deep);
  }
  .brand svg{ width:26px; height:26px; flex:none; color: var(--gold-deep); }
  .brand-photo{
    width:26px; height:26px; border-radius:50%; object-fit:cover; flex:none;
    box-shadow: 0 0 0 2px var(--surface), 0 0 0 3px var(--gold);
  }
  .eyebrow-photo{
    width:18px; height:18px; border-radius:50%; object-fit:cover; flex:none;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.7);
  }

  .progress-wrap{
    display:flex; align-items:center; gap:8px;
    font-size:0.82rem;
    color: var(--ink-soft);
  }
  .progress-track{
    width:110px; height:8px; border-radius:999px;
    background: var(--line-soft);
    overflow:hidden;
  }
  .progress-fill{
    height:100%; border-radius:999px;
    background: linear-gradient(90deg, var(--gold), var(--rose));
    transition: width .5s ease;
  }

  .menu-btn{
    display:flex; align-items:center; gap:6px;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--purple-deep);
    padding: 8px 14px;
    border-radius: 999px;
    font-weight:700;
    font-size:0.88rem;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .menu-btn:hover{ transform: translateY(-1px); }
  .menu-btn svg{ width:16px; height:16px; }

  main{
    flex:1;
    display:flex;
    justify-content:center;
    padding: clamp(20px, 4vw, 48px) 20px 24px;
  }

  .screen{
    width:100%;
    max-width: 880px;
    animation: rise .45s ease both;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .screen{ animation:none; }
    *{ transition:none !important; animation:none !important; }
  }

  /* ---------- reusable bits ---------- */

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:0.78rem;
    font-weight:800;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--gold-deep);
    background: rgba(201,154,62,0.14);
    padding: 6px 12px;
    border-radius:999px;
    margin-bottom:14px;
  }

  .card{
    position:relative;
    background: linear-gradient(180deg, var(--surface), var(--surface-tint));
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: clamp(22px, 4vw, 40px);
  }
  .card::before{
    content:"";
    position:absolute; inset:8px;
    border: 1px solid rgba(201,154,62,0.28);
    border-radius: calc(var(--radius) - 8px);
    pointer-events:none;
  }

  .stack{ display:flex; flex-direction:column; gap:20px; position:relative; z-index:1; }

  .lede{
    color: var(--ink-soft);
    font-size:1.05rem;
    margin-top:10px;
    line-height:1.6;
  }

  .panels{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:16px;
    margin-top:8px;
  }
  @media (max-width: 640px){ .panels{ grid-template-columns: 1fr; } }

  .panel{
    background: linear-gradient(180deg, #FFFCF3, #FBF0DA);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
  }
  .panel h3{
    font-size:0.95rem;
    font-family:'Nunito', sans-serif;
    font-weight:800;
    color: var(--rose-deep);
    margin-bottom:8px;
  }
  .panel p{ color:var(--ink); line-height:1.55; }

  .talk{
    display:flex; gap:12px;
    align-items:flex-start;
    background: rgba(124,143,199,0.12);
    border-left: 3px solid var(--sky);
    border-radius:12px;
    padding:14px 16px;
    margin-top:6px;
    color: var(--ink);
    font-size:0.98rem;
  }
  .talk b{ color:#4C5A94; }

  .refline{
    font-size:0.78rem;
    color: var(--ink-soft);
    opacity:0.85;
    margin-top:4px;
    font-style: italic;
  }

  .actions{
    display:flex; justify-content:space-between; align-items:center;
    gap:12px; margin-top:8px; flex-wrap:wrap;
  }

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    border:none; border-radius:999px;
    padding: 12px 22px;
    font-weight:800;
    font-size:0.95rem;
    box-shadow: var(--shadow);
    transition: transform .15s ease, filter .15s ease;
  }
  .btn:hover{ transform: translateY(-2px); }
  .btn:active{ transform: translateY(0); }

  .btn-primary{ background: linear-gradient(135deg, var(--gold), var(--rose)); color:#fff; }
  .btn-ghost{ background: var(--surface); color: var(--purple-deep); border:1px solid var(--line); box-shadow:none; }
  .btn-ghost:hover{ background:#fffaf0; }
  .btn-sage{ background: linear-gradient(135deg, var(--sage), var(--teal)); color:#fff; }
  .btn-purple{ background: linear-gradient(135deg, var(--purple), var(--purple-deep)); color:#fff; }

  /* ---------- hero / title ---------- */

  .hero{
    position:relative;
    border-radius: 28px;
    overflow:hidden;
    color:#fff;
    padding: clamp(40px, 9vw, 88px) clamp(20px,6vw,56px);
    min-height: 62vh;
    display:flex; flex-direction:column; justify-content:flex-end;
    background: url('assets/hero-night.jpg') center/cover no-repeat;
    box-shadow: var(--shadow);
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(21,12,36,0.15) 0%, rgba(21,12,36,0.82) 78%);
  }
  .hero > *{ position:relative; z-index:1; }
  .hero .eyebrow{ background: rgba(255,255,255,0.16); color:var(--gold-pale); }
  .hero h1{ font-size: clamp(2.1rem, 5vw, 3.3rem); color:#fff; }
  .hero .lede{ color: rgba(255,255,255,0.88); max-width:46ch; }
  .hero .btn-primary{ margin-top:22px; align-self:flex-start; }
  .hero .byline{ margin-top:8px; color:rgba(255,255,255,0.7); font-size:0.85rem; font-style:italic; }

  .scene{
    position:relative; border-radius:24px; overflow:hidden;
    color:#fff; padding: clamp(28px,6vw,44px);
    box-shadow: var(--shadow);
  }
  .scene.night{ background: url('assets/story-lantern-night.jpg') center/cover no-repeat; }
  .scene.indoor{ background: url('assets/story-indoor.jpg') center/cover no-repeat; }
  .scene.classroom{ background: url('assets/classroom.jpg') center/cover no-repeat; }
  .scene.bedroom{ background: url('assets/bedroom.jpg') center/cover no-repeat; }
  .scene.landscape{ background: url('assets/landscape.jpg') center/cover no-repeat; }
  .scene::before{
    content:""; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(21,12,36,0.22), rgba(21,12,36,0.82));
  }
  .scene > *{ position:relative; z-index:1; }
  .scene .lede{ color: rgba(255,255,255,0.90); }
  .scene h2{ color:#fff; }
  .scene .eyebrow{ background: rgba(255,255,255,0.18); color:var(--gold-pale); }

  /* ---------- story reader ---------- */

  .story-page{
    font-family:'Fraunces', serif;
    font-size: 1.12rem;
    line-height:1.75;
    color:#fff;
    max-width: 62ch;
  }
  .story-page p{ margin-bottom: 14px; }
  .story-page p:last-child{ margin-bottom:0; }
  .story-quote{
    font-style:italic;
    color: var(--gold-pale);
    border-left: 3px solid var(--gold);
    padding-left:14px;
    margin: 10px 0;
  }
  .story-meta{
    display:flex; justify-content:space-between; align-items:center;
    color: rgba(255,255,255,0.75); font-size:0.85rem; margin-top:18px;
  }
  .story-dots{ display:flex; gap:6px; }
  .story-dots span{ width:7px; height:7px; border-radius:50%; background: rgba(255,255,255,0.35); }
  .story-dots span.on{ background: var(--gold-pale); }

  /* ---------- agreement ---------- */

  .agreement-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-top:18px;
  }
  @media (max-width:640px){ .agreement-grid{ grid-template-columns:1fr; } }
  .agreement-grid ul{ margin:0; padding-left:1.2em; color: rgba(255,255,255,0.92); line-height:1.7; }
  .agreement-grid li{ margin-bottom:4px; }

  /* ---------- menu ---------- */

  .menu-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:12px;
    margin-top: 10px;
  }
  @media (max-width: 820px){ .menu-grid{ grid-template-columns: repeat(2, 1fr); } }

  .menu-grid.special-row{ grid-template-columns: repeat(6, 1fr); }
  @media (max-width: 980px){ .menu-grid.special-row{ grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 640px){ .menu-grid.special-row{ grid-template-columns: repeat(2, 1fr); } }

  .tile{
    position:relative;
    text-align:left;
    background: var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding: 16px 16px 14px;
    min-height: 108px;
    display:flex; flex-direction:column; justify-content:space-between;
    box-shadow: 0 4px 14px rgba(90,60,20,0.07);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .tile:hover{ transform: translateY(-3px); box-shadow: 0 10px 22px rgba(90,60,20,0.14); border-color:#DDBE7A; }
  .tile .tag{
    font-size:0.72rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase;
  }
  .tile:nth-of-type(4n+1) .tag{ color: var(--rose-deep); }
  .tile:nth-of-type(4n+2) .tag{ color: var(--teal); }
  .tile:nth-of-type(4n+3) .tag{ color: var(--purple); }
  .tile:nth-of-type(4n+4) .tag{ color: var(--gold-deep); }
  .tile .q{ font-size:0.92rem; font-weight:700; color:var(--ink); line-height:1.3; margin-top:6px; }
  .tile .dot{
    position:absolute; top:12px; right:12px;
    width:9px; height:9px; border-radius:50%;
    background: var(--line);
  }
  .tile.visited .dot{ background: var(--gold); box-shadow:0 0 0 4px rgba(201,154,62,0.18); }
  .tile.special{ background: linear-gradient(160deg, #FBF3E3, #FBEAF0); border-color:#EFDBAF; }
  .tile.special .tag{ color: var(--rose-deep) !important; }

  /* ---------- quiz / options ---------- */

  .options{ display:flex; flex-direction:column; gap:10px; margin-top:16px; }
  .option{
    display:flex; align-items:center; gap:12px;
    text-align:left;
    background: var(--surface);
    border:2px solid var(--line);
    border-radius:14px;
    padding: 14px 16px;
    font-weight:700;
    color: var(--ink);
    font-size:0.98rem;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .option:hover{ border-color: var(--sky); }
  .option .letter{
    flex:none; width:30px; height:30px; border-radius:50%;
    background: var(--bg); display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color: var(--ink-soft);
  }
  .option.correct{ border-color: var(--sage); background: #EEF7F1; }
  .option.correct .letter{ background: var(--sage); color:#fff; }
  .option.wrong{ border-color:#D98BA0; background: #FCEFF2; }
  .option.wrong .letter{ background: var(--rose-deep); color:#fff; }
  .option:disabled{ cursor:default; }
  .option:disabled:hover{ border-color: inherit; }

  .feedback{
    margin-top:16px;
    border-radius:14px;
    padding:16px 18px;
    display:flex; gap:12px; align-items:flex-start;
    animation: rise .35s ease both;
    color: var(--ink);
  }
  .feedback.good{ background:#EEF7F1; border:1px solid #CDE8D8; }
  .feedback.retry{ background:#FCEFF2; border:1px solid #F3D4DE; }
  .feedback svg{ flex:none; width:22px; height:22px; margin-top:2px; }
  .feedback.good svg{ color: var(--sage-deep); }
  .feedback.retry svg{ color: var(--rose-deep); }
  .feedback p{ line-height:1.5; color: var(--ink); }
  .feedback .quote{ font-family:'Fraunces', serif; font-style:italic; color:var(--ink-soft); margin-top:8px; display:block; }

  /* ---------- pledge ---------- */

  .checklist{ display:flex; flex-direction:column; gap:10px; margin-top:16px; }
  .check{
    display:flex; align-items:center; gap:12px;
    background: rgba(255,255,255,0.92); border:1px solid rgba(255,255,255,0.5);
    border-radius:14px; padding:13px 16px;
    font-weight:700; color:var(--ink);
    transition: background .15s ease, border-color .15s ease;
  }
  .check input{ width:20px; height:20px; accent-color: var(--gold); flex:none; }
  .check.on{ background:#FBF3E3; border-color:#EFDBAF; }
  .dua{
    margin-top:18px; padding:18px 20px;
    background: rgba(255,255,255,0.14);
    border-radius:14px; border:1px solid rgba(255,255,255,0.3);
  }
  .dua .label{ font-size:0.78rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:var(--gold-pale); }
  .dua p{ font-family:'Fraunces', serif; font-style:italic; font-size:1.1rem; margin-top:8px; color:#fff; line-height:1.5; }

  /* ---------- activity chips ---------- */

  .chips{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px; }
  @media (max-width:640px){ .chips{ grid-template-columns:repeat(2,1fr); } }
  .chip{
    background: var(--surface); border:2px solid var(--line);
    border-radius:14px; padding:16px 12px; text-align:center;
    font-weight:800; color:var(--ink);
  }
  .chip.active{ border-color: var(--gold); background:#FBF3E3; }
  .chip-detail{
    margin-top:14px; padding:16px 18px;
    background: rgba(124,143,199,0.10); border-left:3px solid var(--sky);
    border-radius:12px; color:var(--ink); line-height:1.5;
  }
  .reflect{
    margin-top:18px;
  }
  .reflect label{ font-size:0.85rem; font-weight:800; color:var(--ink-soft); }
  .reflect textarea{
    width:100%; margin-top:8px; padding:14px 16px;
    border-radius:12px; border:1px solid var(--line);
    font-family:'Nunito',sans-serif; font-size:0.98rem; color:var(--ink);
    resize:vertical; min-height:70px; background:#FFFDF7;
  }
  .reflect textarea:focus{ outline:2px solid var(--sky); }

  /* ---------- bonus infographic ---------- */

  .hadith-block{
    background: linear-gradient(180deg, #FFFCF3, #FBF0DA);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px 22px;
    text-align:center;
  }
  .hadith-block .say{
    font-family:'Fraunces', serif; font-style:italic; font-size:1.2rem;
    color: var(--ink); line-height:1.6; max-width:56ch; margin:10px auto 0;
  }
  .hadith-block .who{ font-size:0.85rem; color:var(--ink-soft); margin-top:8px; }
  .hadith-block .ref{ font-size:0.78rem; color:var(--gold-deep); margin-top:10px; font-weight:700; }

  .kisa-list{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:14px; }
  .kisa-chip{
    background:#fff; border:1px solid var(--line); border-radius:999px;
    padding:8px 16px; font-weight:700; font-size:0.9rem; color:var(--purple-deep);
  }

  /* ---------- references ---------- */

  .ref-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:14px; }
  @media (max-width:640px){ .ref-grid{ grid-template-columns:1fr; } }
  .ref-grid h3{ font-size:0.95rem; color:var(--rose-deep); margin-bottom:8px; }
  .ref-grid ul{ margin:0; padding-left:1.1em; color:var(--ink-soft); line-height:1.7; font-size:0.94rem; }
  .note{
    margin-top:18px; padding:14px 16px; border-radius:12px;
    background:#FBF3E3; border:1px solid #EFDBAF; color:var(--ink); font-size:0.92rem;
  }

  footer{
    display:flex; justify-content:space-between; align-items:center;
    max-width:880px; margin:0 auto;
    color: var(--ink-soft); font-size:0.8rem;
    padding: 10px 20px 30px;
    font-style: italic;
  }

  /* ---------- end of lesson: dunya vs Allah ---------- */

  .choice-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:8px;
  }
  @media (max-width:680px){ .choice-grid{ grid-template-columns:1fr; } }

  .choice-card{
    position:relative;
    border:none; text-align:center; cursor:pointer;
    border-radius:20px; overflow:hidden;
    padding: 34px 20px 26px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    box-shadow: var(--shadow);
    border:3px solid transparent;
    transition: transform .15s ease, border-color .15s ease;
  }
  .choice-card:hover{ transform: translateY(-3px); }
  .choice-card:disabled{ cursor:default; }
  .choice-card:disabled:hover{ transform:none; }

  .choice-card.allah{
    background: radial-gradient(circle at 50% 0%, #3E2E63, var(--night-deep) 75%);
  }
  .choice-card.dunya{
    background: linear-gradient(160deg, #F6D9A8, #E8A6B7 60%, #C98BC2);
  }

  .choice-card.selected.correct{ border-color: var(--sage); }
  .choice-card.selected.wrong{ border-color: var(--rose-deep); }

  .choice-word{
    font-family:'Amiri', serif;
    font-size: clamp(2.6rem, 8vw, 3.6rem);
    color: var(--gold-pale);
    line-height:1;
    direction: rtl;
  }
  .choice-icons{ font-size: clamp(1.8rem, 5vw, 2.4rem); letter-spacing:6px; }

  .choice-label{
    font-family:'Fraunces', serif; font-weight:700; font-size:1.15rem;
  }
  .choice-card.allah .choice-label{ color:#fff; }
  .choice-card.dunya .choice-label{ color: var(--purple-deep); }

  .choice-sub{ font-size:0.9rem; line-height:1.5; }
  .choice-card.allah .choice-sub{ color: rgba(255,255,255,0.78); }
  .choice-card.dunya .choice-sub{ color: rgba(74,42,115,0.82); }

  /* ---------- dress-up game ---------- */

  .dressup-stage{
    display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap;
    justify-content:center; margin-top:8px;
  }

  .doll-frame{
    flex:none;
    background: linear-gradient(180deg, #FFFCF3, #FBF0DA);
    border:1px solid var(--line); border-radius:20px;
    padding:20px 16px 16px;
  }
  .doll-wrap{ position:relative; width:200px; margin:0 auto; }
  .doll-base{ display:block; width:100%; height:auto; position:relative; z-index:1; user-select:none; -webkit-user-drag:none; }
  .cloth-layer{
    position:absolute; left:50%; transform:translateX(-50%);
    height:auto; pointer-events:none; user-select:none; -webkit-user-drag:none;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12));
  }
  .doll-caption{
    display:block; text-align:center; margin-top:10px;
    font-size:0.68rem; font-weight:800; letter-spacing:0.04em; text-transform:uppercase;
    color: var(--ink-soft);
  }

  .drop-zone{
    position:absolute; left:50%; transform:translateX(-50%); z-index:6;
    border-radius:16px; border:2px dashed transparent;
    transition: background .15s ease, border-color .15s ease;
  }
  .drop-zone.zone-active{ background: rgba(95,150,121,0.20); border-color: var(--sage); }
  .drop-zone.zone-head{ top:0%; height:36%; width:80%; }
  .drop-zone.zone-top{ top:26%; height:30%; width:82%; }
  .drop-zone.zone-bottom{ top:55%; height:44%; width:76%; }

  .cloth-tray{
    display:grid; grid-template-columns: repeat(2, 1fr); gap:10px;
    flex:1; min-width:240px;
  }
  .cloth-chip{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background: var(--surface); border:2px solid var(--line); border-radius:14px;
    padding:10px 6px 8px; cursor:grab; user-select:none; touch-action:none;
    font-weight:700; color:var(--ink); font-size:0.78rem; text-align:center;
  }
  .cloth-chip .chip-img{ width:56px; height:56px; object-fit:contain; -webkit-user-drag:none; }
  .cloth-chip.dragging{ opacity:0.35; }
  .cloth-chip.worn{ border-color: var(--gold); background:#FBF3E3; }

  .ghost-chip{
    position:fixed; z-index:999; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background: var(--surface); border:2px solid var(--gold); border-radius:14px;
    padding:8px 12px; font-weight:700; color:var(--ink); font-size:0.78rem;
    box-shadow: var(--shadow); transform: translate(-50%,-50%) rotate(-4deg);
  }
  .ghost-chip .chip-img{ width:44px; height:44px; object-fit:contain; }

  .outfit-checklist{ display:flex; gap:16px; flex-wrap:wrap; margin-top:14px; }
  .outfit-checklist .chk{
    display:flex; align-items:center; gap:8px; font-weight:700; font-size:0.92rem;
    color: var(--ink);
  }
  .outfit-checklist .chk .mark{
    width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    color:#fff; flex:none;
  }
  .outfit-checklist .chk.yes .mark{ background: var(--sage); }
  .outfit-checklist .chk.no .mark{ background: var(--rose-deep); }
</style>
</head>
