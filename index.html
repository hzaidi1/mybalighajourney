<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Baligha Journey — Interactive Lesson</title>
<meta name="description" content="An interactive Shia lesson for elementary girls about becoming baligha — questions, stories, a game, and a pledge." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F4F1F9;
    --surface: #FFFFFF;
    --ink: #2E2444;
    --ink-soft: #5C5470;
    --gold: #C99A3E;
    --gold-deep: #A87B24;
    --rose: #D98BA0;
    --rose-deep: #BD6C84;
    --sage: #5F9679;
    --sage-deep: #47755D;
    --sky: #7C8FC7;
    --night: #241B38;
    --night-deep: #180F28;
    --line: #E4DDF0;
    --shadow: 0 10px 30px rgba(46, 36, 68, 0.10);
    --radius: 20px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    scroll-behavior: smooth;
  }

  body{ min-height:100vh; }

  h1, h2, h3, .display{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.15;
    margin: 0;
  }

  p{ margin:0; }

  button{ font-family: inherit; cursor:pointer; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible{
    outline: 3px solid var(--sky);
    outline-offset: 2px;
  }

  img{ max-width:100%; display:block; }

  /* ---------- layout shell ---------- */

  #app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .topbar{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    padding: 12px 20px;
    background: rgba(244,241,249,0.86);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .topbar.hidden{ display:none; }

  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 1.05rem;
    color: var(--ink);
  }
  .brand svg{ width:26px; height:26px; flex:none; }

  .progress-wrap{
    display:flex; align-items:center; gap:8px;
    font-size:0.82rem;
    color: var(--ink-soft);
  }
  .progress-track{
    width:110px; height:8px; border-radius:999px;
    background: var(--line);
    overflow:hidden;
  }
  .progress-fill{
    height:100%; border-radius:999px;
    background: linear-gradient(90deg, var(--gold), var(--rose));
    transition: width .5s ease;
  }

  .menu-btn{
    display:flex; align-items:center; gap:6px;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 999px;
    font-weight:700;
    font-size:0.88rem;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .menu-btn:hover{ transform: translateY(-1px); }
  .menu-btn svg{ width:16px; height:16px; }

  main{
    flex:1;
    display:flex;
    justify-content:center;
    padding: clamp(20px, 4vw, 48px) 20px 64px;
  }

  .screen{
    width:100%;
    max-width: 880px;
    animation: rise .45s ease both;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .screen{ animation:none; }
    *{ transition:none !important; animation:none !important; }
  }

  /* ---------- reusable bits ---------- */

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:0.78rem;
    font-weight:800;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--gold-deep);
    background: rgba(201,154,62,0.12);
    padding: 6px 12px;
    border-radius:999px;
    margin-bottom:14px;
  }

  .card{
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: clamp(20px, 4vw, 36px);
  }

  .stack{ display:flex; flex-direction:column; gap:20px; }

  .lede{
    color: var(--ink-soft);
    font-size:1.05rem;
    margin-top:10px;
  }

  .panels{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:16px;
    margin-top:8px;
  }
  @media (max-width: 640px){ .panels{ grid-template-columns: 1fr; } }

  .panel{
    background: linear-gradient(180deg, #FBF9FE, #F5F1FA);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
  }
  .panel h3{
    font-size:0.95rem;
    font-family:'Nunito', sans-serif;
    font-weight:800;
    color: var(--rose-deep);
    margin-bottom:8px;
  }
  .panel p{ color:var(--ink); line-height:1.55; }

  .talk{
    display:flex; gap:12px;
    align-items:flex-start;
    background: rgba(124,143,199,0.10);
    border-left: 3px solid var(--sky);
    border-radius:12px;
    padding:14px 16px;
    margin-top:6px;
    color: var(--ink);
    font-size:0.98rem;
  }
  .talk b{ color:#4C5A94; }

  .refline{
    font-size:0.78rem;
    color: var(--ink-soft);
    opacity:0.8;
    margin-top:4px;
  }

  .actions{
    display:flex; justify-content:space-between; align-items:center;
    gap:12px; margin-top:8px; flex-wrap:wrap;
  }

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    border:none; border-radius:999px;
    padding: 12px 22px;
    font-weight:800;
    font-size:0.95rem;
    box-shadow: var(--shadow);
    transition: transform .15s ease, filter .15s ease;
  }
  .btn:hover{ transform: translateY(-2px); }
  .btn:active{ transform: translateY(0); }

  .btn-primary{ background: linear-gradient(135deg, var(--gold), var(--rose)); color:#fff; }
  .btn-ghost{ background: var(--surface); color: var(--ink); border:1px solid var(--line); box-shadow:none; }
  .btn-ghost:hover{ background:#faf8fd; }
  .btn-sage{ background: linear-gradient(135deg, var(--sage), var(--sage-deep)); color:#fff; }

  /* ---------- hero / title ---------- */

  .hero{
    position:relative;
    border-radius: 28px;
    overflow:hidden;
    color:#fff;
    padding: clamp(40px, 9vw, 88px) clamp(20px,6vw,56px);
    min-height: 62vh;
    display:flex; flex-direction:column; justify-content:flex-end;
    background: url('assets/img/hero-night.jpg') center/cover no-repeat;
    box-shadow: var(--shadow);
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(24,15,40,0.15) 0%, rgba(24,15,40,0.78) 78%);
  }
  .hero > *{ position:relative; z-index:1; }
  .hero .eyebrow{ background: rgba(255,255,255,0.16); color:#F3E3B8; }
  .hero h1{ font-size: clamp(2.1rem, 5vw, 3.2rem); color:#fff; }
  .hero .lede{ color: rgba(255,255,255,0.86); max-width:46ch; }
  .hero .btn-primary{ margin-top:22px; align-self:flex-start; }

  .scene{
    position:relative; border-radius:24px; overflow:hidden;
    color:#fff; padding: clamp(28px,6vw,44px);
    box-shadow: var(--shadow);
  }
  .scene.night{ background: url('assets/img/story-lantern-night.jpg') center/cover no-repeat; }
  .scene.indoor{ background: url('assets/img/story-indoor.jpg') center/cover no-repeat; }
  .scene.classroom{ background: url('assets/img/classroom.jpg') center/cover no-repeat; }
  .scene.bedroom{ background: url('assets/img/bedroom.jpg') center/cover no-repeat; }
  .scene.landscape{ background: url('assets/img/landscape.jpg') center/cover no-repeat; }
  .scene::before{
    content:""; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(24,15,40,0.20), rgba(24,15,40,0.80));
  }
  .scene > *{ position:relative; z-index:1; }
  .scene .lede{ color: rgba(255,255,255,0.88); }
  .scene h2{ color:#fff; }
  .scene .eyebrow{ background: rgba(255,255,255,0.18); color:#F3E3B8; }

  /* ---------- agreement ---------- */

  .agreement-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-top:18px;
  }
  @media (max-width:640px){ .agreement-grid{ grid-template-columns:1fr; } }
  .agreement-grid ul{ margin:0; padding-left:1.2em; color: rgba(255,255,255,0.92); line-height:1.7; }
  .agreement-grid li{ margin-bottom:4px; }

  /* ---------- menu ---------- */

  .menu-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:12px;
    margin-top: 10px;
  }
  @media (max-width: 820px){ .menu-grid{ grid-template-columns: repeat(2, 1fr); } }

  .tile{
    position:relative;
    text-align:left;
    background: var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding: 16px 16px 14px;
    min-height: 108px;
    display:flex; flex-direction:column; justify-content:space-between;
    box-shadow: 0 4px 14px rgba(46,36,68,0.06);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .tile:hover{ transform: translateY(-3px); box-shadow: 0 10px 22px rgba(46,36,68,0.12); border-color:#D9CDEF; }
  .tile .tag{
    font-size:0.72rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase;
    color: var(--gold-deep);
  }
  .tile .q{ font-size:0.92rem; font-weight:700; color:var(--ink); line-height:1.3; margin-top:6px; }
  .tile .dot{
    position:absolute; top:12px; right:12px;
    width:9px; height:9px; border-radius:50%;
    background: var(--line);
  }
  .tile.visited .dot{ background: var(--gold); box-shadow:0 0 0 4px rgba(201,154,62,0.18); }
  .tile.special{ background: linear-gradient(160deg, #FBF3E3, #FBEAF0); border-color:#F0DCC7; }
  .tile.special .tag{ color: var(--rose-deep); }

  /* ---------- quiz / options ---------- */

  .options{ display:flex; flex-direction:column; gap:10px; margin-top:16px; }
  .option{
    display:flex; align-items:center; gap:12px;
    text-align:left;
    background: var(--surface);
    border:2px solid var(--line);
    border-radius:14px;
    padding: 14px 16px;
    font-weight:700;
    color: var(--ink);
    font-size:0.98rem;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .option:hover{ border-color: var(--sky); }
  .option .letter{
    flex:none; width:30px; height:30px; border-radius:50%;
    background: var(--bg); display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color: var(--ink-soft);
  }
  .option.correct{ border-color: var(--sage); background: #EEF7F1; }
  .option.correct .letter{ background: var(--sage); color:#fff; }
  .option.wrong{ border-color:#D98BA0; background: #FCEFF2; }
  .option.wrong .letter{ background: var(--rose-deep); color:#fff; }
  .option:disabled{ cursor:default; }
  .option:disabled:hover{ border-color: inherit; }

  .feedback{
    margin-top:16px;
    border-radius:14px;
    padding:16px 18px;
    display:flex; gap:12px; align-items:flex-start;
    animation: rise .35s ease both;
  }
  .feedback.good{ background:#EEF7F1; border:1px solid #CDE8D8; }
  .feedback.retry{ background:#FCEFF2; border:1px solid #F3D4DE; }
  .feedback svg{ flex:none; width:22px; height:22px; margin-top:2px; }
  .feedback.good svg{ color: var(--sage-deep); }
  .feedback.retry svg{ color: var(--rose-deep); }
  .feedback p{ line-height:1.5; }
  .feedback .quote{ font-family:'Fraunces', serif; font-style:italic; color:var(--ink-soft); margin-top:8px; display:block; }

  /* ---------- pledge ---------- */

  .checklist{ display:flex; flex-direction:column; gap:10px; margin-top:16px; }
  .check{
    display:flex; align-items:center; gap:12px;
    background: var(--surface); border:1px solid var(--line);
    border-radius:14px; padding:13px 16px;
    font-weight:700; color:var(--ink);
    transition: background .15s ease, border-color .15s ease;
  }
  .check input{ width:20px; height:20px; accent-color: var(--gold); flex:none; }
  .check.on{ background:#FBF3E3; border-color:#EFDBAF; }
  .dua{
    margin-top:18px; padding:18px 20px;
    background: linear-gradient(180deg,#FBF9FE,#F5F1FA);
    border-radius:14px; border:1px solid var(--line);
  }
  .dua .label{ font-size:0.78rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:var(--gold-deep); }
  .dua p{ font-family:'Fraunces', serif; font-style:italic; font-size:1.1rem; margin-top:8px; color:var(--ink); line-height:1.5; }

  /* ---------- activity chips ---------- */

  .chips{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px; }
  @media (max-width:640px){ .chips{ grid-template-columns:repeat(2,1fr); } }
  .chip{
    background: var(--surface); border:2px solid var(--line);
    border-radius:14px; padding:16px 12px; text-align:center;
    font-weight:800; color:var(--ink);
  }
  .chip.active{ border-color: var(--gold); background:#FBF3E3; }
  .chip-detail{
    margin-top:14px; padding:16px 18px;
    background: rgba(124,143,199,0.10); border-left:3px solid var(--sky);
    border-radius:12px; color:var(--ink); line-height:1.5;
  }
  .reflect{
    margin-top:18px;
  }
  .reflect label{ font-size:0.85rem; font-weight:800; color:var(--ink-soft); }
  .reflect textarea{
    width:100%; margin-top:8px; padding:14px 16px;
    border-radius:12px; border:1px solid var(--line);
    font-family:'Nunito',sans-serif; font-size:0.98rem; color:var(--ink);
    resize:vertical; min-height:70px; background:#FBFAFD;
  }
  .reflect textarea:focus{ outline:2px solid var(--sky); }

  /* ---------- references ---------- */

  .ref-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:14px; }
  @media (max-width:640px){ .ref-grid{ grid-template-columns:1fr; } }
  .ref-grid h3{ font-size:0.95rem; color:var(--rose-deep); margin-bottom:8px; }
  .ref-grid ul{ margin:0; padding-left:1.1em; color:var(--ink-soft); line-height:1.7; font-size:0.94rem; }
  .note{
    margin-top:18px; padding:14px 16px; border-radius:12px;
    background:#FBF3E3; border:1px solid #EFDBAF; color:var(--ink); font-size:0.92rem;
  }

  footer{
    text-align:center; color: var(--ink-soft); font-size:0.82rem;
    padding: 18px 20px 30px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js" defer charset="utf-8"></script>
</body>
</html>
